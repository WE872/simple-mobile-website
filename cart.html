<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="styles.css">
<meta charset="UTF-8">
<title>Cart - Simple Mobile</title>

<style>
body {
    font-family: Arial;
    background: #0d6efd;
    color: white;
    margin: 0;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    background: #222;
    margin: 0;
    padding: 0;
    list-style: none;
}

.navbar li {
    list-style: none;
}

.navbar a {
    color: white;
    padding: 15px;
    text-decoration: none;
    display: block;
}

.navbar a:hover {
    background: white;
    color: black;
}

/* CART */
.cart {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #ccc;
}

.total {
    text-align: right;
    font-size: 1.3em;
    margin-top: 15px;
    font-weight: bold;
}

button {
    display: block;
    margin-left: auto;
    margin-top: 10px;
    padding: 10px 20px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<ul class="navbar">
    <li><a href="index.html">Home</a></li>
    <li><a href="phones.html">Phones</a></li>
    <li><a href="accessories.html">Accessories</a></li>
    <li><a href="feedback.html">Feedback</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="cart.html">Cart</a></li>
    <li><a href="offers.html">Offers</a></li>
</ul>

<h1 style="text-align:center;">Your Cart</h1>

<div class="cart">

    <div class="item">
        <span>iPhone 13</span>
        <span>£549</span>
    </div>

    <div class="item">
        <span>AirPods</span>
        <span>£99</span>
    </div>

    <div class="item">
        <span>Smart Watch</span>
        <span>£149</span>
    </div>

    <div class="total">
        Total: £797
    </div>

    <button>Checkout</button>

</div>

</body>
</html>
