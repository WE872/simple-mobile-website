<title>Phones - Simple Mobile</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0d6efd;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    background-color: #222;
}

.navbar li {
    list-style: none;
}

.navbar a {
    color: white;
    text-decoration: none;
    padding: 15px 20px;
    display: block;
}

.navbar a:hover {
    background-color: #fff;
    color: black;
}

/* TITLE */
h1 {
    text-align: center;
    margin-top: 20px;
}

/* GRID SHOP */
.shop-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 30px;
}

/* PRODUCT CARD */
.product {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    color: black;
    text-align: center;
    padding-bottom: 10px;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

/* IMAGE */
.product img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* BUTTON */
button {
    background: #0d6efd;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: black;
}
</style>
</head>
